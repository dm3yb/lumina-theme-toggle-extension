name: Publish

# Publishes to the VS Code Marketplace and Open VSX when release-please publishes
# a GitHub Release. Inert until the repo has a real `publisher` in package.json and
# VSCE_PAT / OVSX_PAT secrets are configured.

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Package extension
        run: pnpm exec vsce package --no-dependencies -o theme-toggle.vsix

      - name: Publish to VS Code Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: pnpm exec vsce publish --no-dependencies --packagePath theme-toggle.vsix -p "$VSCE_PAT"

      - name: Publish to Open VSX
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: pnpm exec ovsx publish theme-toggle.vsix -p "$OVSX_PAT"
